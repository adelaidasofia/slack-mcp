name: Claude Security Review
# Per anthropic-org Phase 5 audit (2026-05-13): claude-code-security-review
# adopted as a Mycelium-client demo asset. Sales talk-track: "AI security
# review on every PR your team opens, automated."
#
# Setup: requires CLAUDE_API_KEY repo secret. Set with:
#   gh secret set CLAUDE_API_KEY -R adelaidasofia/<repo>
# The review STEP is skipped cleanly when the key is absent (so the "security"
# check stays green instead of perpetually failing with a missing-key error),
# and the job is skipped entirely for dependabot[bot] (which cannot read repo
# secrets, and whose version-bump PRs carry no code for an LLM to review).

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    continue-on-error: true
    env:
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: env.CLAUDE_API_KEY != ''
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Claude security review
        if: env.CLAUDE_API_KEY != ''
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda
        with:
          comment-pr: true
          claude-api-key: ${{ env.CLAUDE_API_KEY }}
